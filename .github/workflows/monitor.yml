name: Website Monitor

on:
  schedule:
    - cron: "*/30 * * * *"  # كل نصف ساعة
  workflow_dispatch: {}      # تشغيل يدوي متى بغيت

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monitor script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python monitor.py

      - name: Commit CSV updates
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/uptime_report.csv
          git commit -m "Update uptime_report.csv from workflow run" || echo "No changes"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }} HEAD:main
